# ============================================================================
# Connections (physical port wiring)
# ============================================================================
connections:
# WAN ─ firewall ─ router (uplink chain)
- a:
    resource: pfsense-fw
    portGroup: 1
    portIndex: 0
  b:
    resource: core-router
    portGroup: 1
    portIndex: 0
  label: WAN uplink
# router ─ core-switch (10G trunk)
- a:
    resource: core-router
    portGroup: 1
    portIndex: 0
  b:
    resource: core-switch
    portGroup: 2
    portIndex: 0
  label: core trunk
# core-switch ─ access-switch (1G uplink)
- a:
    resource: core-switch
    portGroup: 0
    portIndex: 0
  b:
    resource: access-switch
    portGroup: 1
    portIndex: 0
  label: uplink
# core-switch ─ proxmox-node01 (10G)
- a:
    resource: core-switch
    portGroup: 2
    portIndex: 1
  b:
    resource: proxmox-node01
    portGroup: 1
    portIndex: 0
  label: 10G
# core-switch ─ proxmox-node02 (10G)
- a:
    resource: core-switch
    portGroup: 2
    portIndex: 2
  b:
    resource: proxmox-node02
    portGroup: 1
    portIndex: 0
  label: 10G
# core-switch ─ truenas-storage (10G)
- a:
    resource: core-switch
    portGroup: 2
    portIndex: 3
  b:
    resource: truenas-storage
    portGroup: 1
    portIndex: 0
  label: 10G
# core-switch ─ docker-host (2.5G)
- a:
    resource: core-switch
    portGroup: 1
    portIndex: 0
  b:
    resource: docker-host
    portGroup: 0
    portIndex: 0
  label: 2.5G
# access-switch ─ lounge-ap (PoE)
- a:
    resource: access-switch
    portGroup: 0
    portIndex: 0
  b:
    resource: lounge-ap
    portGroup: 0
    portIndex: 0
  label: PoE
# access-switch ─ basement-ap (PoE)
- a:
    resource: access-switch
    portGroup: 0
    portIndex: 1
  b:
    resource: basement-ap
    portGroup: 0
    portIndex: 0
  label: PoE
# access-switch ─ workstation-linux
- a:
    resource: access-switch
    portGroup: 0
    portIndex: 2
  b:
    resource: workstation-linux
    portGroup: 0
    portIndex: 0
# access-switch ─ gaming-pc
- a:
    resource: access-switch
    portGroup: 0
    portIndex: 3
  b:
    resource: gaming-pc
    portGroup: 0
    portIndex: 0
